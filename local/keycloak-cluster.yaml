apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: keycloak-cluster

servers: 1
agents: 3

image: "rancher/k3s:v1.27.6-k3s1"

ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer

options:
  k3s:
    extraArgs:
      - arg: "--disable=traefik"
        nodeFilters:
          - "server:*"

volumes:
  - volume: "${HOME}/k3d-volumes:/mnt/volumes"
    nodeFilters:
      - "server:*"
      - "agent:*"