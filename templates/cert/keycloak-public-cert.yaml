apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-public-cert
  namespace: {{ .Values.global.namespace }}
spec:
  secretName: {{ .Values.ingress.public.tls.secretName }}
  issuerRef:
    name: {{ .Values.global.tls.issuerRef }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.ingress.public.host }}